<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>¿Algún cambio? — Revolv</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100vh; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5; color: #222;
    padding: 24px 20px;
    display: flex; flex-direction: column; align-items: center;
  }
  .brand { font-size: 12px; letter-spacing: 2px; color: #888; text-transform: uppercase; font-weight: 600; margin-bottom: 18px; }
  .card {
    background: white; border-radius: 14px; padding: 28px 24px;
    max-width: 480px; width: 100%;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  h1 { margin: 0 0 6px; font-size: 22px; color: #111; }
  .sub { color: #666; font-size: 14px; margin-bottom: 22px; }
  .video-box {
    background: #fafafa; border-left: 4px solid #ff4747;
    padding: 12px 16px; border-radius: 6px; margin-bottom: 22px;
  }
  .video-box .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 4px; }
  .video-box .name { font-size: 15px; color: #111; font-weight: 600; word-break: break-word; }
  label { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 8px; display: block; }
  textarea {
    width: 100%; min-height: 140px; padding: 12px; border-radius: 8px;
    border: 1px solid #ddd; font-size: 15px; font-family: inherit; line-height: 1.5;
    resize: vertical;
  }
  textarea:focus { outline: none; border-color: #ff4747; }
  .hint { font-size: 12px; color: #888; margin-top: 6px; }
  .btn {
    display: block; width: 100%; padding: 14px; border-radius: 10px;
    background: #ff4747; color: white; border: none; font-size: 16px;
    font-weight: 700; cursor: pointer; margin-top: 18px;
    transition: background 0.15s;
  }
  .btn:hover { background: #e63838; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .status { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; text-align: center; }
  .status.ok { background: #e8f5e9; color: #2e7d32; }
  .status.err { background: #ffebee; color: #c62828; }
  .loading { text-align: center; padding: 40px 20px; color: #888; }
  .success-card { text-align: center; padding: 40px 24px; }
  .success-card .icon { font-size: 60px; margin-bottom: 12px; }
  .success-card h2 { margin: 0 0 8px; color: #1a8a3a; font-size: 24px; }
  .success-card p { color: #555; line-height: 1.55; }
  .footer { color: #aaa; font-size: 12px; margin-top: 24px; text-align: center; }
</style>
</head>
<body>
  <div class="brand">REVOLV</div>
  <div id="content" class="card">
    <div class="loading">Cargando...</div>
  </div>
  <div class="footer">— Nacho</div>

<script>
const params = new URLSearchParams(location.search);
const CLIENTE = params.get('cliente') || '';
const FILE_ID = params.get('file_id') || '';
const FILE_NAME = params.get('file_name') || '';
const EDITOR = params.get('editor') || '';
const TOKEN = params.get('t') || '';

if (!CLIENTE || !TOKEN) {
  document.getElementById('content').innerHTML = `<div class="success-card"><div class="icon">⚠️</div><h2>Link inválido</h2><p>El link parece estar roto. Pedile a Nacho que te mande uno nuevo.</p></div>`;
} else {
  renderForm();
}

function renderForm() {
  document.getElementById('content').innerHTML = `
    <h1>¿Qué cambiarías?</h1>
    <p class="sub">Contame qué cambios querés que hagamos en este video. Sé lo más específico posible (timestamps, qué sacar, qué sumar).</p>
    <div class="video-box">
      <div class="label">Video</div>
      <div class="name">${escape(FILE_NAME || '(video)')}</div>
    </div>
    <label for="notes">Tus cambios:</label>
    <textarea id="notes" placeholder="Ej: En 0:23 sacar la pausa, cambiar el subtítulo del minuto 1:14 a 'X', el final que dure 2 segundos menos..."></textarea>
    <div class="hint">Sé detallado — cuanto más claro, más rápido te lo arreglamos.</div>

    <label for="files" style="margin-top:18px;">📷 Fotos (opcional):</label>
    <div style="background:#fafafa; border:1px dashed #ddd; border-radius:8px; padding:14px; text-align:center; margin-bottom:6px;">
      <input id="files" type="file" accept="image/*" multiple style="display:none;" onchange="onFilesPicked(this.files)">
      <button type="button" onclick="document.getElementById('files').click()" style="background:#fff; border:1px solid #ccc; padding:10px 18px; border-radius:6px; cursor:pointer; font-size:14px; font-weight:600;">📎 Sumar fotos</button>
      <div style="font-size:12px; color:#888; margin-top:6px;">Max 5 imágenes · 5MB cada una</div>
    </div>
    <div id="previews" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;"></div>

    <button id="submit" class="btn" onclick="submitReview()">Enviar pedido de cambio</button>
    <div id="status" style="display:none;" class="status"></div>
  `;
}

// ─── Fotos adjuntas ───
let PICKED_FILES = [];
function onFilesPicked(filesList) {
  const newFiles = Array.from(filesList);
  for (const f of newFiles) {
    if (PICKED_FILES.length >= 5) {
      alert('Máximo 5 imágenes');
      break;
    }
    if (f.size > 5 * 1024 * 1024) {
      alert(`"${f.name}" pesa más de 5MB`);
      continue;
    }
    if (!f.type.startsWith('image/')) {
      alert(`"${f.name}" no es una imagen`);
      continue;
    }
    PICKED_FILES.push(f);
  }
  renderPreviews();
}
function renderPreviews() {
  const cont = document.getElementById('previews');
  if (!cont) return;
  cont.innerHTML = PICKED_FILES.map((f, i) => {
    const url = URL.createObjectURL(f);
    return `<div style="position:relative; width:80px; height:80px; border-radius:8px; overflow:hidden; border:1px solid #ddd;">
      <img src="${url}" style="width:100%; height:100%; object-fit:cover;">
      <button onclick="removeFile(${i})" style="position:absolute; top:2px; right:2px; background:rgba(0,0,0,0.6); color:white; border:none; border-radius:50%; width:22px; height:22px; cursor:pointer; font-size:14px; line-height:1;">×</button>
    </div>`;
  }).join('');
}
function removeFile(i) {
  PICKED_FILES.splice(i, 1);
  renderPreviews();
}

async function submitReview() {
  const notes = document.getElementById('notes').value.trim();
  const status = document.getElementById('status');
  const btn = document.getElementById('submit');
  if (!notes) {
    status.className = 'status err';
    status.style.display = 'block';
    status.textContent = 'Escribí qué querés cambiar antes de enviar.';
    return;
  }
  btn.disabled = true;
  btn.textContent = PICKED_FILES.length > 0 ? `Subiendo ${PICKED_FILES.length} foto(s)...` : 'Enviando...';
  status.style.display = 'none';
  try {
    const qs = new URLSearchParams({ cliente: CLIENTE, file_id: FILE_ID, t: TOKEN });
    let res;
    if (PICKED_FILES.length > 0) {
      // Multipart con imágenes
      const fd = new FormData();
      fd.append('notes', notes);
      fd.append('file_name', FILE_NAME);
      fd.append('editor', EDITOR);
      for (const f of PICKED_FILES) {
        fd.append('files', f, f.name);
      }
      res = await fetch(`/api/review?${qs.toString()}`, { method: 'POST', body: fd });
    } else {
      // JSON clásico
      res = await fetch(`/api/review?${qs.toString()}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ notes, file_name: FILE_NAME, editor: EDITOR }),
      });
    }
    const d = await res.json();
    if (!res.ok || !d.ok) throw new Error(d.error || 'HTTP ' + res.status);
    const imgsMsg = d.attachments > 0 ? `<br><span style="color:#888;font-size:13px;">+ ${d.attachments} foto${d.attachments !== 1 ? 's' : ''} adjunta${d.attachments !== 1 ? 's' : ''}</span>` : '';
    document.getElementById('content').innerHTML = `<div class="success-card"><div class="icon">📬</div><h2>¡Listo!</h2><p>Le pasamos tus cambios al editor.${imgsMsg}<br>Te avisamos cuando esté la nueva versión.</p></div>`;
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Enviar pedido de cambio';
    status.className = 'status err';
    status.style.display = 'block';
    status.textContent = 'Error: ' + e.message;
  }
}

function escape(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
</script>
</body>
</html>
