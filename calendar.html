<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Calendario — Asistente Revolv</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#0f1115; color:#e8eaed;
    padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  .page { padding:16px; max-width:1100px; margin:0 auto; }
  .app-header { position:sticky; top:0; z-index:50; background:#0f1115; padding:12px 16px;
    padding-top:calc(12px + env(safe-area-inset-top)); border-bottom:1px solid #2a2f3a;
    display:flex; align-items:center; gap:12px; }
  .back-btn { display:inline-flex; align-items:center; justify-content:center; min-width:40px; min-height:40px;
    background:rgba(255,255,255,0.06); border-radius:10px; color:#e8eaed; text-decoration:none;
    font-size:18px; font-weight:600; }
  .header-title { flex:1; min-width:0; }
  .header-title h1 { margin:0; font-size:17px; font-weight:600; }
  .header-title .subtitle { font-size:11px; color:#8a93a3; }
  .month-nav { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .month-nav button { background:#1a1e27; border:1px solid #2a2f3a; color:#e8eaed; padding:8px 14px; border-radius:8px; cursor:pointer; font-size:14px; font-family:inherit; }
  .month-nav button:hover { background:#1f2430; }
  .month-nav h2 { margin:0; font-size:20px; font-weight:600; text-transform:capitalize; }
  .calendar { display:grid; grid-template-columns:repeat(7, 1fr); gap:4px; }
  .day-header { text-align:center; font-size:11px; color:#8a93a3; padding:4px; text-transform:uppercase; letter-spacing:0.5px; }
  .day-cell { background:#1a1e27; border:1px solid #2a2f3a; border-radius:8px; padding:8px; min-height:90px; display:flex; flex-direction:column; }
  .day-cell.other-month { opacity:0.3; }
  .day-cell.today { border-color:#4ade80; background:#1a2e1a; }
  .day-cell.empty { background:transparent; border:none; }
  .day-num { font-size:13px; font-weight:600; color:#8a93a3; margin-bottom:4px; }
  .day-cell.today .day-num { color:#4ade80; }
  .day-events { display:flex; flex-direction:column; gap:2px; flex:1; overflow:hidden; }
  .event { font-size:10px; padding:2px 5px; border-radius:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; }
  .event.crudo { background:rgba(96, 165, 250, 0.18); color:#60a5fa; }
  .event.editado { background:rgba(74, 222, 128, 0.18); color:#4ade80; }
  .event.count { font-weight:700; }
  .legend { display:flex; gap:14px; margin-top:14px; font-size:11px; color:#8a93a3; flex-wrap:wrap; }
  .legend .item { display:flex; align-items:center; gap:5px; }
  .legend .dot { width:10px; height:10px; border-radius:2px; }
  .loading, .error { padding:32px; text-align:center; color:#8a93a3; }
  .error { color:#f87171; }
  @media (max-width:600px) {
    .day-cell { min-height:60px; padding:4px; }
    .day-num { font-size:11px; }
    .event { font-size:9px; padding:1px 3px; }
    .month-nav h2 { font-size:16px; }
  }
</style>
</head>
<body>
  <header class="app-header">
    <a href="javascript:goBack()" class="back-btn">←</a>
    <div class="header-title">
      <h1>📅 Calendario</h1>
      <div class="subtitle">Actividad por día</div>
    </div>
  </header>
  <div class="page">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">← Anterior</button>
      <h2 id="month-title">Cargando...</h2>
      <button onclick="changeMonth(1)">Siguiente →</button>
    </div>
    <div class="calendar" id="cal"></div>
    <div class="legend">
      <div class="item"><div class="dot" style="background:#60a5fa"></div>Crudos recibidos</div>
      <div class="item"><div class="dot" style="background:#4ade80"></div>Editados entregados</div>
      <div class="item" style="margin-left:auto;"><span style="border:1px solid #4ade80; padding:1px 6px; border-radius:3px;">hoy</span></div>
    </div>
  </div>

<script>
const params = new URLSearchParams(location.search);
let TOKEN = params.get('t') || '';
if (TOKEN) {
  try {
    const saved = JSON.parse(localStorage.getItem('revolv_auth') || '{}');
    localStorage.setItem('revolv_auth', JSON.stringify({ ...saved, token: TOKEN, admin: true }));
  } catch (e) {}
} else {
  try {
    const saved = JSON.parse(localStorage.getItem('revolv_auth') || 'null');
    if (saved && saved.token) TOKEN = saved.token;
  } catch (e) {}
}

let CURRENT = new Date();
CURRENT.setDate(1);
let DATA = null;

function goBack() { location.href = `/?admin=1&t=${encodeURIComponent(TOKEN)}`; }
function changeMonth(delta) {
  CURRENT.setMonth(CURRENT.getMonth() + delta);
  render();
  load();
}

if (!TOKEN) {
  document.querySelector('.page').innerHTML = '<div class="error">Falta token</div>';
} else {
  render();
  load();
}

async function load() {
  try {
    const yyyymm = CURRENT.getFullYear() + '-' + String(CURRENT.getMonth() + 1).padStart(2, '0');
    const res = await fetch(`/api/calendar?admin=1&t=${encodeURIComponent(TOKEN)}&month=${yyyymm}`);
    const d = await res.json();
    if (!res.ok || !d.ok) throw new Error(d.error || 'HTTP ' + res.status);
    DATA = d;
    render();
  } catch (e) {
    document.getElementById('cal').innerHTML = `<div class="error" style="grid-column:1/-1;">Error: ${e.message}</div>`;
  }
}

function render() {
  const MES_NAMES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const DAY_NAMES = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
  document.getElementById('month-title').textContent = `${MES_NAMES[CURRENT.getMonth()]} ${CURRENT.getFullYear()}`;

  const cal = document.getElementById('cal');
  const today = new Date();
  const todayStr = today.toISOString().slice(0, 10);

  const firstDay = new Date(CURRENT.getFullYear(), CURRENT.getMonth(), 1);
  const lastDay = new Date(CURRENT.getFullYear(), CURRENT.getMonth() + 1, 0);
  // Monday-first: día 0 = domingo en JS, queremos lunes=0
  let firstDow = (firstDay.getDay() + 6) % 7;  // 0=lun ... 6=dom

  let html = '';
  // Day headers
  for (const dn of DAY_NAMES) html += `<div class="day-header">${dn}</div>`;
  // Empty cells before day 1
  for (let i = 0; i < firstDow; i++) html += '<div class="day-cell empty"></div>';
  // Days
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dStr = `${CURRENT.getFullYear()}-${String(CURRENT.getMonth() + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dStr === todayStr;
    const dayData = (DATA?.days || {})[dStr] || {};
    const crudos = dayData.crudos || 0;
    const editados = dayData.editados || 0;
    const eventsHtml = [];
    if (crudos > 0) eventsHtml.push(`<div class="event crudo">📥 ${crudos} crudo${crudos !== 1 ? 's' : ''}</div>`);
    if (editados > 0) eventsHtml.push(`<div class="event editado">📤 ${editados} editado${editados !== 1 ? 's' : ''}</div>`);
    html += `<div class="day-cell ${isToday ? 'today' : ''}">
      <div class="day-num">${d}</div>
      <div class="day-events">${eventsHtml.join('')}</div>
    </div>`;
  }
  cal.innerHTML = html;
}
</script>
</body>
</html>
