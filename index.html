<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Revolv</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-card: #141414;
            --bg-card-2: #1c1c1c;
            --border: #262626;
            --text: #e8e8e8;
            --text-dim: #888;
            --accent: #ff4747;
            --green: #4ade80;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 32px;
            max-width: 1100px;
            margin: 0 auto;
        }
        header.main-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 24px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        h1 .red-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 12px;
            vertical-align: middle;
        }
        .header-meta {
            color: var(--text-dim);
            font-size: 13px;
            text-align: right;
        }
        .editor-name {
            color: var(--text);
            font-weight: 600;
            font-size: 16px;
        }
        button {
            font-family: inherit;
            cursor: pointer;
        }
        .add-btn-main {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        .add-btn-main:hover { opacity: 0.9; }
        #content {
            min-height: 200px;
        }
        .editor-block {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .editor-block h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .editor-block h2 > span:first-child {
            flex: 1;
        }
        .add-mini {
            background: var(--bg-card-2);
            color: var(--text-dim);
            border: 1px solid var(--border);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: all 0.15s;
        }
        .add-mini:hover { background: var(--accent); color: white; }
        .cliente-card {
            background: var(--bg-card-2);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            transition: opacity 0.2s, transform 0.2s;
        }
        .cliente-card.removing {
            opacity: 0;
            transform: translateX(20px);
        }
        .cliente-name { font-weight: 500; }
        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 6px;
            opacity: 0.4;
            transition: opacity 0.15s, background 0.15s;
        }
        .cliente-card:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: rgba(255, 71, 71, 0.15); }
        .empty {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }
        .error {
            background: rgba(255, 71, 71, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div>
            <h1><span class="red-dot"></span>Asistente Revolv</h1>
            <p style="color: var(--text-dim); margin-top: 4px; font-size: 14px;" id="subtitle">
                Cargando...
            </p>
        </div>
        <div class="header-meta">
            <div id="user-label" class="editor-name">—</div>
            <div style="margin-top:6px;">Última: <span id="updated">—</span></div>
        </div>
    </header>

    <button class="add-btn-main" onclick="openAddDialog()">+ Agregar pendiente</button>

    <div id="content">
        <div class="loading">Cargando datos…</div>
    </div>

<script>
const params = new URLSearchParams(location.search);
const EDITOR = params.get('editor') || '';
const TOKEN = params.get('t') || '';
const IS_ADMIN = params.get('admin') === '1';

const subtitle = document.getElementById('subtitle');
const userLabel = document.getElementById('user-label');
const updatedSpan = document.getElementById('updated');
const content = document.getElementById('content');

if (!TOKEN || (!EDITOR && !IS_ADMIN)) {
    content.innerHTML = '<div class="error">Faltan parámetros en la URL.<br>Pedile a Ignacio el link correcto.</div>';
} else {
    userLabel.textContent = IS_ADMIN ? 'Administrador (Ignacio)' : EDITOR;
    subtitle.textContent = IS_ADMIN
        ? 'Vista global — todos los editores'
        : 'Tus pendientes hoy';
    loadData();
}

async function loadData() {
    content.innerHTML = '<div class="loading">Cargando…</div>';
    const url = IS_ADMIN
        ? `/api/data?admin=1&t=${encodeURIComponent(TOKEN)}`
        : `/api/data?editor=${encodeURIComponent(EDITOR)}&t=${encodeURIComponent(TOKEN)}`;
    try {
        const res = await fetch(url);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
        render(data);
        updatedSpan.textContent = new Date().toLocaleTimeString();
    } catch (e) {
        content.innerHTML = `<div class="error">No pude cargar:\n${e.message}</div>`;
    }
}

function render(data) {
    if (IS_ADMIN) {
        renderAdmin(data);
    } else {
        renderEditor(data);
    }
}

function renderEditor(data) {
    const items = data.pendientes || [];
    if (items.length === 0) {
        content.innerHTML = '<div class="empty">✅ No tenés pendientes.</div>';
        return;
    }
    let html = `<section class="editor-block"><h2>${escapeHtml(EDITOR)} <span style="color: var(--text-dim); font-weight: 400; font-size: 14px;">${items.length} ${items.length === 1 ? 'cliente' : 'clientes'}</span></h2>`;
    for (const it of items) {
        const clienteEsc = escapeHtml(it.cliente).replace(/'/g, '&#39;');
        html += `<div class="cliente-card">
            <span class="cliente-name">${escapeHtml(it.cliente)}</span>
            <button class="delete-btn" onclick="deleteCliente('${clienteEsc}', null, this)" title="Marcar como hecho">🗑️</button>
        </div>`;
    }
    html += '</section>';
    content.innerHTML = html;
}

function renderAdmin(data) {
    const byEditor = data.by_editor || {};
    const editorLinks = data.editor_links || {};
    const editores = Object.keys(byEditor).sort((a, b) => byEditor[b].length - byEditor[a].length);
    if (editores.length === 0) {
        content.innerHTML = '<div class="empty">✅ Sin pendientes globales.<br><br><button class="add-btn-main" onclick="addClientToEditorPrompt()">+ Agregar editor con cliente</button></div>';
        return;
    }

    // Sección de links únicos por editor
    let linksHtml = '<details class="editor-block" style="margin-bottom:24px;"><summary style="cursor:pointer; font-size: 16px; font-weight: 600;">🔗 Links únicos por editor (click para mostrar)</summary><div style="margin-top:16px;">';
    for (const ed of Object.keys(editorLinks).sort()) {
        const fullUrl = location.origin + editorLinks[ed];
        linksHtml += `<div style="background: var(--bg-card-2); padding: 10px 14px; border-radius: 6px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 13px;">
            <div><strong>${escapeHtml(ed)}</strong> <a href="${fullUrl}" target="_blank" style="color: var(--text-dim); margin-left: 8px;">${escapeHtml(fullUrl)}</a></div>
            <button onclick="copyLink('${fullUrl}', this)" style="background: var(--bg-card); color: var(--text-dim); border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;">Copiar</button>
        </div>`;
    }
    linksHtml += '</div></details>';

    let html = linksHtml;
    for (const ed of editores) {
        const items = byEditor[ed];
        const edEsc = escapeHtml(ed).replace(/'/g, '&#39;');
        html += `<section class="editor-block">
            <h2>
                <span>${escapeHtml(ed)} <span style="color: var(--text-dim); font-weight: 400; font-size: 14px;">${items.length}</span></span>
                <button class="add-mini" onclick="addClientToEditor('${edEsc}')" title="Agregar cliente a ${escapeHtml(ed)}">+</button>
            </h2>`;
        for (const it of items) {
            const clienteEsc = escapeHtml(it.cliente).replace(/'/g, '&#39;');
            html += `<div class="cliente-card">
                <span class="cliente-name">${escapeHtml(it.cliente)}</span>
                <button class="delete-btn" onclick="deleteCliente('${clienteEsc}', '${edEsc}', this)" title="Marcar como hecho">🗑️</button>
            </div>`;
        }
        html += '</section>';
    }
    content.innerHTML = html;
}

function copyLink(url, btn) {
    navigator.clipboard.writeText(url).then(() => {
        const original = btn.textContent;
        btn.textContent = '✓ copiado';
        btn.style.color = 'var(--green)';
        setTimeout(() => {
            btn.textContent = original;
            btn.style.color = '';
        }, 1500);
    });
}

async function addClientToEditor(editor) {
    const cliente = prompt(`Cliente pendiente para ${editor}:`);
    if (!cliente || !cliente.trim()) return;
    try {
        const res = await fetch('/api/task', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                admin: 1, t: TOKEN,
                target_editor: editor,
                cliente: cliente.trim(),
            }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || ('HTTP ' + res.status));
        loadData();
    } catch (e) {
        alert('No se pudo agregar:\n' + e.message);
    }
}

async function addClientToEditorPrompt() {
    const editor = prompt('Editor (nombre):');
    if (!editor || !editor.trim()) return;
    addClientToEditor(editor.trim());
}

async function deleteCliente(cliente, editor, btn) {
    if (!confirm(`¿Marcar como hecho TODOS los pendientes de ${cliente}?`)) return;
    btn.disabled = true;
    const card = btn.closest('.cliente-card');
    const params = new URLSearchParams({
        cliente: cliente,
        t: TOKEN,
    });
    if (IS_ADMIN) {
        params.set('admin', '1');
        if (editor) params.set('editor', editor);
    } else {
        params.set('editor', EDITOR);
    }
    try {
        const res = await fetch('/api/task?' + params.toString(), { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || ('HTTP ' + res.status));
        card.classList.add('removing');
        setTimeout(() => card.remove(), 250);
    } catch (e) {
        btn.disabled = false;
        alert('No se pudo eliminar:\n' + e.message);
    }
}

async function openAddDialog() {
    let editor = EDITOR;
    if (IS_ADMIN) {
        editor = prompt('¿Editor al que agregar el pendiente?');
        if (!editor || !editor.trim()) return;
        editor = editor.trim();
    }
    const cliente = prompt(`Nombre del cliente pendiente para ${editor}:`);
    if (!cliente || !cliente.trim()) return;
    try {
        const body = IS_ADMIN
            ? { admin: 1, t: TOKEN, target_editor: editor, cliente: cliente.trim() }
            : { editor: EDITOR, t: TOKEN, cliente: cliente.trim() };
        const res = await fetch('/api/task', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || ('HTTP ' + res.status));
        loadData();
    } catch (e) {
        alert('No se pudo agregar:\n' + e.message);
    }
}

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
}
</script>
</body>
</html>
