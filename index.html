<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Asistente Revolv</title>
    <!-- PWA: instalable como app en celular -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f1115">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Revolv">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-card: #141414;
            --bg-card-2: #1c1c1c;
            --border: #262626;
            --text: #e8e8e8;
            --text-dim: #888;
            --accent: #ff4747;
            --green: #4ade80;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 32px;
            max-width: 1100px;
            margin: 0 auto;
        }
        header.main-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 24px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        h1 .red-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 12px;
            vertical-align: middle;
        }
        .header-meta {
            color: var(--text-dim);
            font-size: 13px;
            text-align: right;
        }
        .editor-name {
            color: var(--text);
            font-weight: 600;
            font-size: 16px;
        }
        .progress-widget {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .progress-label { color: var(--text-dim); font-size: 13px; }
        .progress-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
        }
        .progress-value:hover { color: var(--accent); }
        .progress-bar {
            background: var(--bg-card-2);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            flex: 1;
            margin: 0 16px;
            max-width: 200px;
        }
        .progress-fill {
            background: var(--accent);
            height: 100%;
            transition: width 0.3s;
        }
        .progress-edit-input {
            background: var(--bg);
            border: 1px solid var(--accent);
            color: var(--text);
            font-size: 18px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            width: 60px;
            text-align: center;
            font-family: inherit;
        }
        button {
            font-family: inherit;
            cursor: pointer;
        }
        .add-btn-main {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        .add-btn-main:hover { opacity: 0.9; }
        #content {
            min-height: 200px;
        }
        .editor-block {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .editor-block h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .editor-block h2 > span:first-child {
            flex: 1;
        }
        .add-mini {
            background: var(--bg-card-2);
            color: var(--text-dim);
            border: 1px solid var(--border);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: all 0.15s;
        }
        .add-mini:hover { background: var(--accent); color: white; }
        .cliente-card {
            background: var(--bg-card-2);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            transition: opacity 0.2s, transform 0.2s;
        }
        .cliente-card.removing {
            opacity: 0;
            transform: translateX(20px);
        }
        .cliente-name { font-weight: 500; }
        .cliente-count {
            color: var(--text-dim);
            font-size: 13px;
            margin-left: 10px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .cliente-count:hover { background: var(--bg-card); color: var(--text); }
        .cliente-count.editing {
            background: var(--bg);
            border: 1px solid var(--accent);
            outline: none;
            color: var(--text);
            width: 50px;
            text-align: center;
            font-family: inherit;
        }
        .cliente-meta { display: flex; align-items: center; flex: 1; gap: 8px; }
        .card-actions { display: flex; gap: 4px; }
        .delete-btn, .reassign-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 6px;
            opacity: 0.4;
            cursor: pointer;
            transition: opacity 0.15s, background 0.15s;
        }
        .cliente-card:hover .delete-btn,
        .cliente-card:hover .reassign-btn { opacity: 1; }
        .delete-btn:hover { background: rgba(255, 71, 71, 0.15); }
        .reassign-btn:hover { background: rgba(96, 165, 250, 0.15); color: #60a5fa; }
        .drive-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: rgba(96, 165, 250, 0.12);
            color: #60a5fa;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 13px;
            transition: background 0.15s;
        }
        .drive-btn:hover { background: rgba(96, 165, 250, 0.25); }

        /* Modal de agregar cliente */
        .add-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            z-index: 200; padding: 16px;
        }
        .add-modal {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 22px; width: 100%; max-width: 460px;
        }
        .add-modal h3 { margin: 0 0 16px; font-size: 17px; }
        .add-modal .field-row { margin-bottom: 14px; }
        .add-modal label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
        .add-modal input, .add-modal select {
            width: 100%; background: var(--bg); color: var(--text);
            border: 1px solid var(--border); padding: 9px 12px;
            border-radius: 6px; font-size: 14px; font-family: inherit;
        }
        .add-modal input:focus, .add-modal select:focus {
            outline: none; border-color: #4ade80;
        }
        .add-modal .readonly-val {
            padding: 9px 12px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 6px;
            color: var(--text-dim); font-size: 14px;
        }
        .suggest-list {
            position: absolute; top: 100%; left: 0; right: 0;
            background: var(--bg-card-2); border: 1px solid var(--border);
            border-radius: 6px; margin-top: 4px;
            max-height: 240px; overflow-y: auto; z-index: 10;
        }
        .suggest-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; cursor: pointer; font-size: 13px;
            border-bottom: 1px solid var(--border);
        }
        .suggest-item:last-child { border-bottom: none; }
        .suggest-item:hover, .suggest-item.active { background: var(--bg); }
        .suggest-item .icon { font-size: 14px; }
        .modal-actions {
            display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px;
        }
        .btn {
            padding: 8px 16px; border-radius: 6px; font-size: 13px;
            font-weight: 500; cursor: pointer; border: none; font-family: inherit;
        }
        .btn-primary { background: #4ade80; color: #0f1115; }
        .btn-primary:hover { background: #3ec170; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-cancel { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
        .btn-cancel:hover { color: var(--text); }
        .empty {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }
        .error {
            background: rgba(255, 71, 71, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div>
            <h1><span class="red-dot"></span>Asistente Revolv</h1>
            <p style="color: var(--text-dim); margin-top: 4px; font-size: 14px;" id="subtitle">
                Cargando...
            </p>
        </div>
        <div class="header-meta">
            <div id="user-label" class="editor-name">—</div>
            <div style="margin-top:6px;">Última: <span id="updated">—</span></div>
        </div>
    </header>

    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:8px;">
      <button class="add-btn-main" onclick="openAddDialog()">+ Agregar pendiente</button>
      <a id="stats-link" href="#" style="display:none; padding:10px 16px; background:#2d3445; color:#e8eaed; border-radius:8px; text-decoration:none; font-size:14px; font-weight:500;">📊 Ver Stats</a>
      <a id="config-link" href="#" style="display:none; padding:10px 16px; background:#2d3445; color:#e8eaed; border-radius:8px; text-decoration:none; font-size:14px; font-weight:500;">⚙️ Configuración</a>
    </div>

    <div id="content">
        <div class="loading">Cargando datos…</div>
    </div>

<script>
// Auth con persistencia: la primera vez se pasa por URL (?editor=X&t=Y o ?admin=1&t=Y).
// Se guarda en localStorage para que la PWA pueda abrir desde el ícono sin params.
// Si vienen params en URL, esos GANAN (permite cambiar credenciales).
const params = new URLSearchParams(location.search);
const urlEditor = params.get('editor') || '';
const urlToken = params.get('t') || '';
const urlAdmin = params.get('admin') === '1';

let EDITOR, TOKEN, IS_ADMIN;
if (urlToken && (urlEditor || urlAdmin)) {
    EDITOR = urlEditor;
    TOKEN = urlToken;
    IS_ADMIN = urlAdmin;
    // Persistir para próximas aperturas (PWA desde ícono pierde params)
    try {
        localStorage.setItem('revolv_auth', JSON.stringify({ editor: EDITOR, token: TOKEN, admin: IS_ADMIN }));
    } catch (e) {}
    // Si entró con params y NO está en standalone (PWA), limpiar la URL
    // para que el link compartido no quede expuesto en la barra
    if (history.replaceState) {
        const clean = location.pathname;
        history.replaceState({}, '', clean);
    }
} else {
    try {
        const saved = JSON.parse(localStorage.getItem('revolv_auth') || 'null');
        if (saved && saved.token) {
            EDITOR = saved.editor || '';
            TOKEN = saved.token;
            IS_ADMIN = !!saved.admin;
        } else {
            EDITOR = ''; TOKEN = ''; IS_ADMIN = false;
        }
    } catch (e) {
        EDITOR = ''; TOKEN = ''; IS_ADMIN = false;
    }
}

const subtitle = document.getElementById('subtitle');
const userLabel = document.getElementById('user-label');
const updatedSpan = document.getElementById('updated');
const content = document.getElementById('content');

if (!TOKEN || (!EDITOR && !IS_ADMIN)) {
    content.innerHTML = '<div class="error">Faltan parámetros en la URL.<br>Pedile a Ignacio el link correcto.</div>';
} else {
    userLabel.textContent = IS_ADMIN ? 'Administrador (Ignacio)' : EDITOR;
    subtitle.textContent = IS_ADMIN
        ? 'Vista global — todos los editores'
        : 'Tus pendientes hoy';
    if (IS_ADMIN) {
        const statsLink = document.getElementById('stats-link');
        if (statsLink) {
            statsLink.href = `/stats.html?t=${encodeURIComponent(TOKEN)}`;
            statsLink.style.display = 'inline-block';
        }
        const cfgLink = document.getElementById('config-link');
        if (cfgLink) {
            cfgLink.href = `/config.html?t=${encodeURIComponent(TOKEN)}`;
            cfgLink.style.display = 'inline-block';
        }
    }
    loadData();
}

async function loadData() {
    content.innerHTML = '<div class="loading">Cargando…</div>';
    const url = IS_ADMIN
        ? `/api/data?admin=1&t=${encodeURIComponent(TOKEN)}`
        : `/api/data?editor=${encodeURIComponent(EDITOR)}&t=${encodeURIComponent(TOKEN)}`;
    try {
        const res = await fetch(url);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
        LAST_DATA = data;
        render(data);
        updatedSpan.textContent = new Date().toLocaleTimeString();
    } catch (e) {
        content.innerHTML = `<div class="error">No pude cargar:\n${e.message}</div>`;
    }
}
let LAST_DATA = null;

// PWA: registrar service worker para instalación como app
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

function render(data) {
    if (IS_ADMIN) {
        renderAdmin(data);
    } else {
        renderEditor(data);
    }
}

function renderProgressWidget(p, editorName) {
    const pct = p.total > 0 ? Math.min(100, (p.current / p.total) * 100) : 0;
    const labelEsc = escapeHtml(p.label).replace(/'/g, '&#39;');
    return `
    <div class="progress-widget">
        <div>
            <div class="progress-label">${escapeHtml(p.label)}</div>
            <div>
                <span class="progress-value" onclick="editProgress('${editorName}', '${labelEsc}', ${p.current}, ${p.total}, this, 'current')" title="Click para editar">${p.current}</span>
                <span style="color: var(--text-dim); font-size: 20px;">/</span>
                <span class="progress-value" onclick="editProgress('${editorName}', '${labelEsc}', ${p.current}, ${p.total}, this, 'total')" title="Click para editar el total">${p.total}</span>
            </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
    </div>`;
}

function renderAllProgresses(progresses, editorName) {
    if (!progresses || progresses.length === 0) return '';
    return progresses.map(p => renderProgressWidget(p, editorName)).join('');
}

function renderEditor(data) {
    const items = data.pendientes || [];
    let html = renderAllProgresses(data.progresses, EDITOR);
    if (items.length === 0) {
        content.innerHTML = html + '<div class="empty">✅ No tenés pendientes.</div>';
        return;
    }
    html += `<section class="editor-block"><h2>${escapeHtml(EDITOR)} <span style="color: var(--text-dim); font-weight: 400; font-size: 14px;">${items.length} ${items.length === 1 ? 'cliente' : 'clientes'}</span></h2>`;
    for (const it of items) {
        const clienteEsc = escapeHtml(it.cliente).replace(/'/g, '&#39;');
        const videos = it.videos || 1;
        const driveBtn = it.drive_folder_id
            ? `<a href="https://drive.google.com/drive/folders/${it.drive_folder_id}" target="_blank" class="drive-btn" title="Abrir carpeta en Drive">📁</a>`
            : '';
        html += `<div class="cliente-card">
            <span class="cliente-meta">
                ${driveBtn}
                <span class="cliente-name">${escapeHtml(it.cliente)}</span>
                <span class="cliente-count" onclick="editCount('${clienteEsc}', null, ${videos}, this)" title="Click para editar">${videos} video${videos !== 1 ? 's' : ''}</span>
            </span>
            <button class="delete-btn" onclick="deleteCliente('${clienteEsc}', null, this)" title="Marcar como hecho">🗑️</button>
        </div>`;
    }
    html += '</section>';
    content.innerHTML = html;
}

function renderAdmin(data) {
    const byEditor = data.by_editor || {};
    const editorLinks = data.editor_links || {};
    // Orden: primero editores CON pendientes (más cantidad arriba), después vacíos alfabéticos
    const editores = Object.keys(byEditor).sort((a, b) => {
        const la = byEditor[a].length;
        const lb = byEditor[b].length;
        if (la === 0 && lb > 0) return 1;
        if (lb === 0 && la > 0) return -1;
        if (la === 0 && lb === 0) return a.localeCompare(b);
        return lb - la;
    });
    if (editores.length === 0) {
        content.innerHTML = '<div class="empty">✅ Sin pendientes globales.<br><br><button class="add-btn-main" onclick="addClientToEditorPrompt()">+ Agregar editor con cliente</button></div>';
        return;
    }

    // Sección de links únicos por editor
    let linksHtml = '<details class="editor-block" style="margin-bottom:24px;"><summary style="cursor:pointer; font-size: 16px; font-weight: 600;">🔗 Links únicos por editor (click para mostrar)</summary><div style="margin-top:16px;">';
    for (const ed of Object.keys(editorLinks).sort()) {
        const fullUrl = location.origin + editorLinks[ed];
        linksHtml += `<div style="background: var(--bg-card-2); padding: 10px 14px; border-radius: 6px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 13px;">
            <div><strong>${escapeHtml(ed)}</strong> <a href="${fullUrl}" target="_blank" style="color: var(--text-dim); margin-left: 8px;">${escapeHtml(fullUrl)}</a></div>
            <button onclick="copyLink('${fullUrl}', this)" style="background: var(--bg-card); color: var(--text-dim); border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;">Copiar</button>
        </div>`;
    }
    linksHtml += '</div></details>';

    const editorProgresses = data.editor_progresses || {};
    let html = linksHtml;
    for (const ed of editores) {
        const items = byEditor[ed];
        const edEsc = escapeHtml(ed).replace(/'/g, '&#39;');
        const edProgresses = editorProgresses[ed] || [];
        const progHtml = renderAllProgresses(edProgresses, ed);
        const countLabel = items.length === 0 ? '<span style="color: var(--text-dim); font-weight: 400; font-size: 13px; font-style: italic;">sin pendientes</span>' : `<span style="color: var(--text-dim); font-weight: 400; font-size: 14px;">${items.length}</span>`;
        html += `<section class="editor-block">
            <h2>
                <span>${escapeHtml(ed)} ${countLabel}</span>
                <button class="add-mini" onclick="addClientToEditor('${edEsc}')" title="Agregar cliente a ${escapeHtml(ed)}">+</button>
            </h2>
            ${progHtml}`;
        for (const it of items) {
            const clienteEsc = escapeHtml(it.cliente).replace(/'/g, '&#39;');
            const videos = it.videos || 1;
            const driveBtn = it.drive_folder_id
                ? `<a href="https://drive.google.com/drive/folders/${it.drive_folder_id}" target="_blank" class="drive-btn" title="Abrir carpeta en Drive">📁</a>`
                : '';
            html += `<div class="cliente-card">
                <span class="cliente-meta">
                    ${driveBtn}
                    <span class="cliente-name">${escapeHtml(it.cliente)}</span>
                    <span class="cliente-count" onclick="editCount('${clienteEsc}', '${edEsc}', ${videos}, this)" title="Click para editar">${videos} video${videos !== 1 ? 's' : ''}</span>
                </span>
                <div class="card-actions">
                    <button class="reassign-btn" onclick="reassignClient('${clienteEsc}', '${edEsc}', this)" title="Reasignar a otro editor">↪</button>
                    <button class="delete-btn" onclick="deleteCliente('${clienteEsc}', '${edEsc}', this)" title="Marcar como hecho">🗑️</button>
                </div>
            </div>`;
        }
        html += '</section>';
    }
    content.innerHTML = html;
}

function editProgress(editorName, label, currentCurrent, currentTotal, spanEl, field) {
    if (spanEl.classList.contains('editing')) return;
    const initial = field === 'current' ? currentCurrent : currentTotal;
    const input = document.createElement('input');
    input.type = 'number';
    input.min = '0';
    input.value = initial;
    input.className = 'progress-edit-input';
    spanEl.replaceWith(input);
    input.focus();
    input.select();

    let saved = false;
    const save = async () => {
        if (saved) return;
        saved = true;
        const newVal = parseInt(input.value, 10);
        if (isNaN(newVal) || newVal < 0) {
            input.replaceWith(spanEl);
            return;
        }
        const newCurrent = field === 'current' ? newVal : currentCurrent;
        const newTotal = field === 'total' ? newVal : currentTotal;
        const body = {
            progress: 1,
            editor: editorName,
            label: label,
            current: newCurrent,
            total: newTotal,
            t: TOKEN,
        };
        if (IS_ADMIN) body.admin = 1;
        try {
            const res = await fetch('/api/task', {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
            });
            const data = await res.json();
            if (!res.ok || !data.ok) throw new Error(data.error || 'HTTP ' + res.status);
            loadData();
        } catch (e) {
            alert('No se pudo actualizar:\n' + e.message);
            input.replaceWith(spanEl);
        }
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') input.blur();
        if (ev.key === 'Escape') { saved = true; input.replaceWith(spanEl); }
    });
}

function editCount(cliente, editor, currentValue, spanEl) {
    if (spanEl.classList.contains('editing')) return;
    const input = document.createElement('input');
    input.type = 'number';
    input.min = '0';
    input.value = currentValue;
    input.className = 'cliente-count editing';
    spanEl.replaceWith(input);
    input.focus();
    input.select();

    let saved = false;
    const save = async () => {
        if (saved) return;
        saved = true;
        const newCount = parseInt(input.value, 10);
        if (isNaN(newCount) || newCount < 0 || newCount === currentValue) {
            // Revert
            input.replaceWith(spanEl);
            return;
        }
        // Si pone 0 → es como borrar
        if (newCount === 0) {
            if (!confirm(`¿Marcar todo ${cliente} como hecho?`)) {
                input.replaceWith(spanEl);
                return;
            }
            const params = new URLSearchParams({ cliente, t: TOKEN });
            if (IS_ADMIN) { params.set('admin', '1'); if (editor) params.set('editor', editor); }
            else { params.set('editor', EDITOR); }
            try {
                await fetch('/api/task?' + params, { method: 'DELETE' });
                loadData();
            } catch (e) { alert(e.message); input.replaceWith(spanEl); }
            return;
        }
        // PATCH
        const body = {
            cliente, count: newCount, t: TOKEN,
        };
        if (IS_ADMIN) { body.admin = 1; if (editor) body.editor = editor; }
        else { body.editor = EDITOR; }
        try {
            const res = await fetch('/api/task', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            const data = await res.json();
            if (!res.ok || !data.ok) throw new Error(data.error || 'HTTP ' + res.status);
            // Actualizar UI sin recargar
            spanEl.textContent = newCount + ' video' + (newCount !== 1 ? 's' : '');
            input.replaceWith(spanEl);
        } catch (e) {
            alert('No se pudo actualizar:\n' + e.message);
            input.replaceWith(spanEl);
        }
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') input.blur();
        if (ev.key === 'Escape') { saved = true; input.replaceWith(spanEl); }
    });
}

function copyLink(url, btn) {
    navigator.clipboard.writeText(url).then(() => {
        const original = btn.textContent;
        btn.textContent = '✓ copiado';
        btn.style.color = 'var(--green)';
        setTimeout(() => {
            btn.textContent = original;
            btn.style.color = '';
        }, 1500);
    });
}

// Cache de la lista de clientes (autocomplete)
let CLIENTS_CACHE = null;
async function getClientsList() {
    if (CLIENTS_CACHE) return CLIENTS_CACHE;
    try {
        const params = IS_ADMIN
            ? `admin=1&t=${encodeURIComponent(TOKEN)}&list_clients=1`
            : `editor=${encodeURIComponent(EDITOR)}&t=${encodeURIComponent(TOKEN)}&list_clients=1`;
        const res = await fetch(`/api/data?${params}`);
        const data = await res.json();
        CLIENTS_CACHE = data.clients || [];
        return CLIENTS_CACHE;
    } catch (e) {
        return [];
    }
}

async function addClientToEditor(editor) {
    showAddClientDialog(editor);
}
async function addClientToEditorPrompt() {
    showAddClientDialog(null);
}
function refreshClientsCache() { CLIENTS_CACHE = null; }

function showAddClientDialog(presetEditor) {
    const editores = LAST_DATA && LAST_DATA.by_editor
        ? Object.keys(LAST_DATA.by_editor).filter(e => !e.startsWith('—'))
        : [];

    const overlay = document.createElement('div');
    overlay.className = 'add-overlay';
    overlay.innerHTML = `
      <div class="add-modal">
        <h3>Agregar pendiente</h3>
        ${presetEditor ? `<div class="field-row"><label>Editor</label><div class="readonly-val">${escapeHtml(presetEditor)}</div></div>` : `
        <div class="field-row">
          <label>Editor</label>
          <select id="add-editor-sel">
            <option value="">— elegí —</option>
            ${editores.map(e => `<option value="${escapeHtml(e)}">${escapeHtml(e)}</option>`).join('')}
          </select>
        </div>`}
        <div class="field-row" style="position:relative;">
          <label>Cliente</label>
          <input id="add-cliente-input" type="text" autocomplete="off" placeholder="Escribí: roger, cisco, etc." autofocus>
          <div id="add-suggest" class="suggest-list"></div>
        </div>
        <div style="font-size:11px; color:var(--text-dim); margin-bottom:10px;">↑↓ navegar · enter seleccionar · escapar cancelar</div>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="add-cancel">Cancelar</button>
          <button class="btn btn-primary" id="add-submit">Agregar</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    const input = overlay.querySelector('#add-cliente-input');
    const suggest = overlay.querySelector('#add-suggest');
    const submitBtn = overlay.querySelector('#add-submit');
    const cancelBtn = overlay.querySelector('#add-cancel');
    let selectedFromList = null;
    let activeIdx = -1;
    let currentMatches = [];

    function close() { overlay.remove(); }
    cancelBtn.onclick = close;
    overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

    async function update(q) {
        const list = await getClientsList();
        const norm = (q || '').trim().toLowerCase();
        if (!norm) { suggest.innerHTML = ''; currentMatches = []; activeIdx = -1; return; }
        currentMatches = list.filter(c =>
            c.cliente.toLowerCase().includes(norm)
        ).slice(0, 8);
        suggest.innerHTML = currentMatches.map((c, i) => `
          <div class="suggest-item ${i===activeIdx?'active':''}" data-idx="${i}">
            ${c.folder_id ? '<span class="icon">📁</span>' : '<span class="icon" style="opacity:0.3">—</span>'}
            <span>${escapeHtml(c.cliente)}</span>
          </div>`).join('');
        // Click handlers
        suggest.querySelectorAll('.suggest-item').forEach(el => {
            el.onclick = () => {
                const idx = parseInt(el.dataset.idx);
                selectedFromList = currentMatches[idx];
                input.value = selectedFromList.cliente;
                suggest.innerHTML = '';
                currentMatches = [];
            };
        });
    }

    input.addEventListener('input', () => { selectedFromList = null; update(input.value); });
    input.addEventListener('keydown', e => {
        if (e.key === 'Escape') return close();
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (currentMatches.length === 0) return;
            activeIdx = (activeIdx + 1) % currentMatches.length;
            update(input.value);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (currentMatches.length === 0) return;
            activeIdx = (activeIdx - 1 + currentMatches.length) % currentMatches.length;
            update(input.value);
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (activeIdx >= 0 && currentMatches[activeIdx]) {
                selectedFromList = currentMatches[activeIdx];
                input.value = selectedFromList.cliente;
                suggest.innerHTML = '';
                currentMatches = [];
                activeIdx = -1;
            } else {
                submit();
            }
        }
    });

    async function submit() {
        const cliente = input.value.trim();
        if (!cliente) return alert('Falta cliente');
        let editor = presetEditor;
        if (!editor) {
            const sel = overlay.querySelector('#add-editor-sel');
            editor = sel ? sel.value : '';
            if (!editor) return alert('Elegí un editor');
        }
        submitBtn.disabled = true;
        try {
            const body = IS_ADMIN
                ? { admin: 1, t: TOKEN, target_editor: editor, cliente }
                : { editor: EDITOR, t: TOKEN, cliente };
            const res = await fetch('/api/task', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            const data = await res.json();
            if (!res.ok || !data.ok) throw new Error(data.error || ('HTTP ' + res.status));
            close();
            refreshClientsCache();
            loadData();
        } catch (e) {
            submitBtn.disabled = false;
            alert('No se pudo agregar:\n' + e.message);
        }
    }
    submitBtn.onclick = submit;
    update('');  // precarga
}

async function reassignClient(cliente, currentEditor, btn) {
    // Lista de editores disponibles
    const editores = Object.keys(LAST_DATA?.by_editor || {}).filter(e => !e.startsWith('—'));
    const opciones = editores.join(', ');
    const nuevo = prompt(`Reasignar "${cliente}" a qué editor?\n\nActual: ${currentEditor}\nDisponibles: ${opciones}\n\nEscribí el nombre:`);
    if (!nuevo || !nuevo.trim()) return;
    const trimmed = nuevo.trim();
    if (trimmed.toLowerCase() === currentEditor.toLowerCase()) {
        alert('Es el mismo editor.');
        return;
    }
    btn.disabled = true;
    try {
        const res = await fetch('/api/task', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                admin: 1, t: TOKEN,
                action: 'reassign',
                cliente: cliente,
                current_editor: currentEditor,
                new_editor: trimmed,
            }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || ('HTTP ' + res.status));
        await loadData();
    } catch (e) {
        btn.disabled = false;
        alert('No se pudo reasignar:\n' + e.message);
    }
}

async function deleteCliente(cliente, editor, btn) {
    if (!confirm(`¿Marcar como hecho TODOS los pendientes de ${cliente}?`)) return;
    btn.disabled = true;
    const card = btn.closest('.cliente-card');
    const params = new URLSearchParams({
        cliente: cliente,
        t: TOKEN,
    });
    if (IS_ADMIN) {
        params.set('admin', '1');
        if (editor) params.set('editor', editor);
    } else {
        params.set('editor', EDITOR);
    }
    try {
        const res = await fetch('/api/task?' + params.toString(), { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || ('HTTP ' + res.status));
        card.classList.add('removing');
        setTimeout(() => card.remove(), 250);
    } catch (e) {
        btn.disabled = false;
        alert('No se pudo eliminar:\n' + e.message);
    }
}

async function openAddDialog() {
    // Si es editor, ya tenemos el editor; si es admin, lo elige en el modal
    showAddClientDialog(IS_ADMIN ? null : EDITOR);
}

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
}
