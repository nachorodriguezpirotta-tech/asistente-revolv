name: Test Review Mail (preview cliente)

# Workflow disparable manualmente desde GitHub Actions UI.
# Manda UN mail de prueba a TEST_EMAIL (Ignacio) idéntico al que recibiría
# un cliente cuando se entrega un video, incluyendo los botones de revisión.
# El cliente de prueba se borra después del envío para no ensuciar la DB.

on:
  workflow_dispatch: {}

# Sin lock — es one-shot manual, no compite con scan
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send test review mail
        env:
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          MAIL_OAUTH_REFRESH_TOKEN: ${{ secrets.MAIL_OAUTH_REFRESH_TOKEN }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          DASHBOARD_SECRET: ${{ secrets.DASHBOARD_SECRET }}
        run: python scripts/test_review_mail.py

      - name: Commit DB cleanup if changed
        run: |
          git config user.name "asistente-bot"
          git config user.email "bot@revolv.local"
          if git status --porcelain tracker.db | grep -q .; then
            git add tracker.db
            git commit -m "[bot] test-review-mail cleanup [skip ci]"
            git pull --rebase
            git push
          fi
