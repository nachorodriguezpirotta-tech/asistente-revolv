name: Check Secret Sync (cron firma == endpoint valida)

# Verifica diariamente que el DASHBOARD_SECRET de GitHub Actions matchea
# el de Vercel: genera un token de prueba con el secret de GitHub y lo
# manda al endpoint Vercel. Si validar → secrets sincronizados. Si 401
# → alerta por mail.

on:
  schedule:
    - cron: "0 12 * * *"  # 9:00 ART todos los días
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate test token + hit endpoint
        env:
          DASHBOARD_SECRET: ${{ secrets.DASHBOARD_SECRET }}
          ALERT_EMAIL: ${{ secrets.TEST_EMAIL }}
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          MAIL_OAUTH_REFRESH_TOKEN: ${{ secrets.MAIL_OAUTH_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, hmac, hashlib, urllib.request, urllib.parse, sys
          secret = (os.environ.get("DASHBOARD_SECRET") or "").strip()
          if not secret:
              print("::error::DASHBOARD_SECRET no está seteada en GitHub Secrets.")
              sys.exit(1)

          # Firmar token igual que make_client_token
          cliente = "HEALTHCHECK"
          tok = hmac.new(
              secret.encode(),
              f"client:{cliente.lower().strip()}".encode(),
              hashlib.sha256,
          ).hexdigest()[:16]

          url = (
              "https://asistente-revolv.vercel.app/api/review"
              f"?action=info&cliente={urllib.parse.quote(cliente)}&file_id=hc&t={tok}"
          )
          try:
              with urllib.request.urlopen(url, timeout=20) as r:
                  status = r.status
                  body = r.read().decode("utf-8", errors="replace")[:200]
          except urllib.error.HTTPError as e:
              status = e.code
              body = e.read().decode("utf-8", errors="replace")[:200]
          except Exception as e:
              print(f"::error::Error consultando endpoint: {e}")
              sys.exit(1)

          print(f"Status: {status}")
          print(f"Body: {body}")
          if status == 200:
              print("✅ Secrets sincronizados (GitHub Actions firma == Vercel valida).")
              sys.exit(0)
          if status == 401:
              # Mandar alerta por mail
              print("::error::SECRETS DESINCRONIZADOS — el endpoint rechazó el token firmado por este workflow.")
              try:
                  sys.path.insert(0, os.getcwd())
                  from mail_client import send_mail
                  send_mail(
                      to=os.environ["ALERT_EMAIL"],
                      subject="🚨 Asistente Revolv: DASHBOARD_SECRET desincronizado",
                      body_text=(
                          "El workflow check-secret-sync detectó que el DASHBOARD_SECRET\n"
                          "de GitHub Actions NO matchea el de Vercel.\n\n"
                          "Síntoma: los tokens de los mails a clientes van a dar 401.\n\n"
                          "Cómo arreglar:\n"
                          "  1. Generá un secret nuevo (32+ chars random)\n"
                          "  2. Ponelo IDÉNTICO en:\n"
                          "     - GitHub: https://github.com/nachorodriguezpirotta-tech/asistente-revolv/settings/secrets/actions\n"
                          "     - Vercel: https://vercel.com/nachorodriguezpirotta-techs-projects/asistente-revolv/settings/environment-variables\n"
                          "  3. Vercel auto-redeploy. Próximo cron firma con el nuevo.\n\n"
                          f"Status del endpoint: {status}\n"
                          f"Body: {body}\n"
                      ),
                  )
                  print("📧 Alerta enviada.")
              except Exception as e:
                  print(f"::error::No pude mandar mail de alerta: {e}")
              sys.exit(1)
          print(f"::error::Status inesperado del endpoint: {status}")
          sys.exit(1)
          PY
