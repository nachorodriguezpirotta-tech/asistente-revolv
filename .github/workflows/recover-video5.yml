name: Recover Video 5 Lili (one-off)

on:
  workflow_dispatch: {}

concurrency:
  group: scan-drive
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Recover
        env:
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          MAIL_OAUTH_REFRESH_TOKEN: ${{ secrets.MAIL_OAUTH_REFRESH_TOKEN }}
          DASHBOARD_SECRET: ${{ secrets.DASHBOARD_SECRET }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python _recover_video5.py
      - name: Commit DB
        run: |
          git config user.name "asistente-bot"
          git config user.email "bot@revolv.local"
          if ! git status --porcelain tracker.db | grep -q .; then
            echo "sin cambios"; exit 0
          fi
          git add tracker.db
          git commit -m "manual: recover Video 5 Lili [skip ci]"
          for attempt in 1 2 3 4; do
            if git pull --rebase -X ours && git push; then exit 0; fi
            git rebase --abort || true
            git fetch origin main && git reset --soft origin/main
            git add tracker.db
            git commit -m "manual: recover Video 5 Lili [skip ci]" || true
            sleep $((2 * attempt))
          done
          exit 1
