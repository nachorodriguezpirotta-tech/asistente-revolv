name: Scan Drive (Asistente Revolv)

on:
  schedule:
    # Cada 1 hora: scan COMPLETO (descubre clientes nuevos, re-estima counts,
    # cierra tareas, etc). El scan-incremental.yml corre cada 2 min para
    # latencia inmediata, este queda como backup full sweep.
    - cron: '0 * * * *'
  # workflow_dispatch RE-HABILITADO 09/jun/2026: /api/trigger lo dispara 1×/hora
  # (minuto 4-5). El cron de GHA es errático (gaps de 1.5-2h) y este scan es la
  # ÚNICA red que recorre carpetas directo (inmune al lag del índice de búsqueda
  # de Drive — bug Lili pack mayo: Changes API y files.list global no veían los
  # editados de Rami por 30-60 min). El riesgo de duplicados que motivó
  # deshabilitarlo (2026-05-20) ya no existe: lock scan-drive + dedupe atómico
  # Turso + dedupe mail_log + Drive appProperties.
  workflow_dispatch: {}
  push:
    branches: [main]
    # NO disparar si solo cambia la DB (los commits del bot no deben re-ejecutar)
    paths-ignore:
      - 'tracker.db'

# Concurrency lock: si un workflow ya está corriendo, encolar el siguiente
# en vez de cancelarlo. Previene race conditions que generaban mails duplicados
# (workflows en paralelo veían el mismo archivo como "nuevo" antes de que
# el otro lo marcara como conocido).
concurrency:
  group: scan-drive
  cancel-in-progress: false

# Permiso para que el workflow pueda commitear la DB actualizada
permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # token con permiso de push para que el commit del bot pueda subir
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan with notify (con reintento automático)
        env:
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          MAIL_OAUTH_REFRESH_TOKEN: ${{ secrets.MAIL_OAUTH_REFRESH_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        # Reintento: hasta 3 intentos con backoff exponencial (10s, 30s)
        run: |
          for i in 1 2 3; do
            python scan.py --notify && break
            ec=$?
            echo "Intento $i falló (exit $ec)"
            if [ $i -lt 3 ]; then
              sleep $((10 * i * i))
            else
              exit $ec
            fi
          done

      - name: Commit DB (Contents API, rapido)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if ! git status --porcelain tracker.db | grep -q .; then
            echo "DB sin cambios"; exit 0
          fi
          python push_db_api.py
