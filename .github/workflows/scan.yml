name: Scan Drive (Asistente Revolv)

on:
  schedule:
    # Cada 30 min (GitHub Actions tiene latencia variable de hasta ~15 min)
    - cron: '*/30 * * * *'
  workflow_dispatch: {}  # disparable a mano desde la UI de GitHub

# Solo una corrida a la vez. Si una está en curso y dispara otra, espera.
concurrency:
  group: scan
  cancel-in-progress: false

# Permiso para que el workflow pueda commitear la DB actualizada
permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # token con permiso de push para que el commit del bot pueda subir
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan with notify
        env:
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
        run: python scan.py --notify

      - name: Commit DB if changed
        run: |
          git config user.name "asistente-bot"
          git config user.email "bot@revolv.local"
          if git status --porcelain tracker.db | grep -q .; then
            git add tracker.db
            git commit -m "[bot] update tracker.db ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
            echo "✅ DB actualizada en repo"
          else
            echo "ℹ️  DB sin cambios, no commit necesario"
          fi
