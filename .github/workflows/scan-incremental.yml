name: Scan Incremental (Asistente Revolv)

# Scan rápido que usa Drive Changes API — procesa solo lo que cambió desde
# el último run. Tarda segundos, corre cada 5 min.
# Antes era */2 pero GitHub Actions free-tier hace throttle de crons < 5 min:
# se veían gaps de 3-4 horas entre runs. */5 es el mínimo "oficial" que GHA
# respeta razonablemente. Si necesitamos latencia <5min, hay que mover a
# Vercel Cron Pro o servicio externo (cron-job.org).
# El scan completo (scan.yml) sigue corriendo cada hora como backup.

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 min (mínimo confiable en GHA free)
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - 'tracker.db'
      - '*.md'
      - '.gitignore'

# Lock: mismo grupo que scan.yml para que NUNCA corran en paralelo.
# Sin esto, dos workflows podían procesar la misma cola de mails de cierre y
# mandar 2 veces el mismo mail.
concurrency:
  group: scan-drive
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # bumped de 5 → 10 (caso backlog grande)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run incremental scan with notify (con reintento)
        env:
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          MAIL_OAUTH_REFRESH_TOKEN: ${{ secrets.MAIL_OAUTH_REFRESH_TOKEN }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          DASHBOARD_SECRET: ${{ secrets.DASHBOARD_SECRET }}
        run: |
          for i in 1 2 3; do
            python scan_incremental.py --notify && break
            ec=$?
            echo "Intento $i falló (exit $ec)"
            if [ $i -lt 3 ]; then sleep $((5 * i)); else exit $ec; fi
          done

      - name: Commit DB if changed
        run: |
          git config user.name "asistente-bot"
          git config user.email "bot@revolv.local"
          if ! git status --porcelain tracker.db | grep -q .; then
            echo "DB sin cambios"
            exit 0
          fi
          git add tracker.db
          git commit -m "[bot-inc] update tracker.db ($(date -u +%Y-%m-%dT%H:%M:%SZ)) [skip ci]"
          # Reintentar push hasta 3 veces. tracker.db es binario y git no
          # puede 3-way merge, así que en caso de conflicto tomamos NUESTRA
          # versión (theirs en jerga de rebase = nuestro commit). Es seguro
          # porque el scan ya mandó los mails antes de este step; la DB es
          # solo el log de "ya procesado", y la próxima iteración recupera
          # cualquier estado faltante via Drive Changes page_token.
          for attempt in 1 2 3; do
            if git pull --rebase -X theirs; then
              if git push; then
                echo "DB actualizada (intento $attempt)"
                exit 0
              fi
            else
              echo "⚠️ Conflicto en rebase (intento $attempt), abort y retry"
              git rebase --abort || true
              # Si rebase abortó, recommiteamos sobre HEAD actualizado
              git fetch origin main
              git reset --soft origin/main
              git add tracker.db
              git commit -m "[bot-inc] update tracker.db ($(date -u +%Y-%m-%dT%H:%M:%SZ)) [skip ci]" || true
            fi
            sleep $((2 * attempt))
          done
          echo "❌ No se pudo pushear tracker.db después de 3 intentos"
          exit 1
