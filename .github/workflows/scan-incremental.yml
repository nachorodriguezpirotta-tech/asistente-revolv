name: Scan Incremental (Asistente Revolv)

# Scan rápido que usa Drive Changes API — procesa solo lo que cambió desde
# el último run. Tarda segundos, corre cada 2 min para latencia mínima.
# El scan completo (scan.yml) sigue corriendo cada hora como backup.

on:
  schedule:
    - cron: '*/2 * * * *'   # cada 2 minutos
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - 'tracker.db'
      - '*.md'
      - '.gitignore'

# Lock: mismo grupo que scan.yml para que NUNCA corran en paralelo.
# Sin esto, dos workflows podían procesar la misma cola de mails de cierre y
# mandar 2 veces el mismo mail.
concurrency:
  group: scan-drive
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # debería tardar segundos, 5 min es paranoia

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run incremental scan with notify (con reintento)
        env:
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          MAIL_OAUTH_REFRESH_TOKEN: ${{ secrets.MAIL_OAUTH_REFRESH_TOKEN }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          for i in 1 2 3; do
            python scan_incremental.py --notify && break
            ec=$?
            echo "Intento $i falló (exit $ec)"
            if [ $i -lt 3 ]; then sleep $((5 * i)); else exit $ec; fi
          done

      - name: Commit DB if changed
        run: |
          git config user.name "asistente-bot"
          git config user.email "bot@revolv.local"
          if git status --porcelain tracker.db | grep -q .; then
            git add tracker.db
            git commit -m "[bot-inc] update tracker.db ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git pull --rebase
            git push
            echo "DB actualizada"
          else
            echo "DB sin cambios"
          fi
