name: Purge tracker.db (one-off)
on:
  workflow_dispatch: {}
concurrency: { group: scan-drive, cancel-in-progress: false }
permissions: { contents: write }
jobs:
  purge:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with: { token: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Purge + commit (sobre la última versión)
        run: |
          git config user.name "asistente-bot"
          git config user.email "bot@revolv.local"
          for attempt in 1 2 3 4 5; do
            git fetch origin main && git reset --hard origin/main
            python _purge_db.py
            git add tracker.db
            git commit -m "maint: purga tracker.db (reviews viejas + VACUUM) [skip ci]" || { echo "sin cambios"; exit 0; }
            if git push; then echo "OK intento $attempt"; exit 0; fi
            echo "push falló, reintento"; sleep $((3 * attempt))
          done
          exit 1
