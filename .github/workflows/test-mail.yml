name: Test mail entrega-a-cliente (one-off)

# Manda un mail de prueba al TEST_EMAIL para verificar que los botones
# (link al portal + 'todo perfecto') funcionan. Dispara a mano. Borrar después.

on:
  workflow_dispatch: {}

jobs:
  testmail:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send test mail
        env:
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          MAIL_OAUTH_REFRESH_TOKEN: ${{ secrets.MAIL_OAUTH_REFRESH_TOKEN }}
          DASHBOARD_SECRET: ${{ secrets.DASHBOARD_SECRET }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
        run: python _send_test_mail.py
