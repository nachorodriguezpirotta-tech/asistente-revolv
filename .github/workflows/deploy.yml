name: Deploy a producción (Vercel)

# Se dispara cuando entra un cambio REAL a main (un PR mergeado).
# NO se dispara con los commits del bot:
#   - GitHub Actions saltea solo los commits con [skip ci] (los del bot lo tienen).
#   - Además ignoramos cambios que toquen únicamente tracker.db.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'tracker.db'
      - 'tracker.db-*'
      - '**/*.db'

# Un deploy a la vez; no encolar de más.
concurrency:
  group: vercel-prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy a producción
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_ak6kuAO3PBmZblFBPna4YOnJ
          VERCEL_PROJECT_ID: prj_0WTpYb3raIcA9WyEefeUInfvezu8
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Falta el secret VERCEL_TOKEN. Agregalo en Settings → Secrets → Actions."
            exit 1
          fi
          npx --yes vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx --yes vercel@latest build --prod --token="$VERCEL_TOKEN"
          npx --yes vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
