name: Editor Reminders (3pm Argentina)

# Recordatorios "⏰ X videos esperando" a editores atrasados (>5d).
# SEPARADO del daily summary (pedido Ignacio 10/jun: "se manda todo junto").
# Horario: 15:00 ART = 18:00 UTC. El cron de GHA atrasa hasta 2-3h, así que
# /api/trigger también lo dispara puntual a las 18:00-18:01 UTC (cron-job.org
# pinguea cada minuto). reminders.py tiene throttle por editor → el doble
# disparo (cron + trigger) NO duplica mails.

on:
  schedule:
    - cron: '0 18 * * *'   # backup; el disparo puntual viene del trigger
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send editor reminders (atraso > 5d)
        env:
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          MAIL_OAUTH_REFRESH_TOKEN: ${{ secrets.MAIL_OAUTH_REFRESH_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
        run: python reminders.py
