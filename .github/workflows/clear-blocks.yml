name: Clear client blocks (one-off)

on:
  workflow_dispatch: {}

concurrency:
  group: clear-blocks-oneoff
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  clear:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Clear blocks (siempre sobre la última versión)
        run: |
          git config user.name "asistente-bot"
          git config user.email "bot@revolv.local"
          for attempt in 1 2 3 4 5 6; do
            git fetch origin main && git reset --hard origin/main
            python _clear_blocks.py
            if git diff --quiet tracker.db; then
              echo "client_blocks ya está vacío — nada que pushear"; exit 0
            fi
            git add tracker.db
            git commit -m "manual: limpiar client_blocks (todos activos) [skip ci]"
            if git push; then echo "OK intento $attempt"; exit 0; fi
            echo "push falló (intento $attempt), reintento sobre la última versión"
            sleep $((2 * attempt))
          done
          echo "no se pudo pushear tras 6 intentos"; exit 1
