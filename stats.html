<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stats — Asistente Revolv</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1115; color: #e8eaed; margin: 0; padding: 24px;
  }
  .header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #2a2f3a;
  }
  h1 { margin: 0; font-size: 22px; font-weight: 600; }
  .subtitle { font-size: 13px; color: #8a93a3; margin-top: 4px; }
  .back-link {
    font-size: 13px; color: #8a93a3; text-decoration: none;
  }
  .back-link:hover { color: #e8eaed; }
  .updated { font-size: 11px; color: #5a6478; }
  .loading, .error {
    padding: 32px; text-align: center; color: #8a93a3;
  }
  .error { color: #ff7676; white-space: pre-wrap; }

  /* TOTALES ARRIBA */
  .totals {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 12px; margin-bottom: 28px;
  }
  .totals .card {
    background: #1a1e27; border-radius: 10px; padding: 16px 18px;
    border: 1px solid #2a2f3a;
  }
  .totals .label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    color: #8a93a3; margin-bottom: 6px;
  }
  .totals .value {
    font-size: 28px; font-weight: 700; color: #e8eaed;
  }
  .totals .extra { font-size: 12px; color: #5a6478; margin-top: 4px; }

  /* TABLA EDITORES */
  table {
    width: 100%; border-collapse: collapse; background: #1a1e27;
    border-radius: 10px; overflow: hidden; border: 1px solid #2a2f3a;
  }
  th, td {
    padding: 14px 16px; text-align: left; font-size: 13px;
    border-bottom: 1px solid #2a2f3a;
  }
  th {
    background: #14171f; color: #8a93a3; font-weight: 500;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1f2430; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.editor-name { font-weight: 600; color: #e8eaed; }
  .health {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; margin-right: 8px; vertical-align: middle;
  }
  .health.ok { background: #4ade80; }
  .health.warning { background: #fbbf24; }
  .health.critical { background: #f87171; }
  .badge-critical {
    background: #3a1a1a; color: #f87171; padding: 2px 8px;
    border-radius: 4px; font-size: 11px; font-weight: 600;
  }
  .badge-empty { color: #5a6478; font-style: italic; }
  .alert-banner {
    background: #3a1a1a; border-left: 4px solid #f87171;
    padding: 12px 16px; border-radius: 6px; margin-bottom: 20px;
    font-size: 13px;
  }
  .top-list {
    display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px;
  }
  .top-list .editor-chip {
    background: #2d3445; padding: 3px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 500;
  }
  .top-list .editor-chip:nth-child(1) { background: #3a3210; color: #fbbf24; }
  .top-list .editor-chip:nth-child(2) { background: #2a2d34; color: #c0c8d4; }
  .top-list .editor-chip:nth-child(3) { background: #2a201a; color: #d4a070; }
</style>
</head>
<body>
  <div class="header">
    <div>
      <h1>📊 Stats Asistente Revolv</h1>
      <div class="subtitle" id="subtitle">Productividad y métricas por editor</div>
    </div>
    <div style="text-align:right;">
      <a href="javascript:goBack()" class="back-link">← Dashboard</a>
      <div class="updated">Actualizado: <span id="updated">—</span></div>
    </div>
  </div>

  <div id="content">
    <div class="loading">Cargando métricas…</div>
  </div>

<script>
const params = new URLSearchParams(location.search);
const TOKEN = params.get('t') || '';
const content = document.getElementById('content');
const updatedSpan = document.getElementById('updated');

function goBack() {
  location.href = `/?admin=1&t=${encodeURIComponent(TOKEN)}`;
}

if (!TOKEN) {
  content.innerHTML = '<div class="error">Falta token. Pedile a Ignacio el link correcto.</div>';
} else {
  loadStats();
}

async function loadStats() {
  content.innerHTML = '<div class="loading">Cargando métricas…</div>';
  try {
    const res = await fetch(`/api/stats?admin=1&t=${encodeURIComponent(TOKEN)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
    render(data);
    updatedSpan.textContent = new Date().toLocaleTimeString();
  } catch (e) {
    content.innerHTML = `<div class="error">No pude cargar:\n${e.message}</div>`;
  }
}

function render(data) {
  const t = data.totals;
  let html = '';

  // Banner si hay críticos
  if (data.critical_editors && data.critical_editors.length > 0) {
    html += `<div class="alert-banner">
      🚨 <strong>${data.critical_editors.length} editor(es) con pending hace +7 días:</strong>
      ${data.critical_editors.join(', ')}
    </div>`;
  }

  // Totales arriba
  html += `<div class="totals">
    <div class="card">
      <div class="label">Pendientes ahora</div>
      <div class="value">${t.pending_videos}</div>
      <div class="extra">${t.pending_clientes} clientes</div>
    </div>
    <div class="card">
      <div class="label">Entregados 7 días</div>
      <div class="value">${t.delivered_week}</div>
      <div class="extra">${t.delivered_month} en 30 días</div>
    </div>
    <div class="card">
      <div class="label">🏆 Top de la semana</div>
      <div class="top-list">
        ${(data.top_delivered_week || []).map(e => `<span class="editor-chip">${e}</span>`).join('') || '<span class="badge-empty">sin entregas aún</span>'}
      </div>
    </div>
  </div>`;

  // Tabla por editor
  html += `<table>
    <thead><tr>
      <th>Editor</th>
      <th class="num">Pendientes</th>
      <th class="num">Clientes</th>
      <th class="num">Entregados 7d</th>
      <th class="num">Entregados 30d</th>
      <th class="num">Tiempo promedio</th>
      <th class="num">Pending más vieja</th>
    </tr></thead>
    <tbody>`;

  for (const s of data.by_editor) {
    const turn = s.avg_turnaround_hours
      ? (s.avg_turnaround_hours < 24
          ? `${s.avg_turnaround_hours}h`
          : `${(s.avg_turnaround_hours / 24).toFixed(1)} días`)
      : '<span class="badge-empty">—</span>';
    const oldest = s.oldest_pending_days > 0
      ? (s.oldest_pending_days >= 7
          ? `<span class="badge-critical">${s.oldest_pending_days} d</span>`
          : `${s.oldest_pending_days} días`)
      : '<span class="badge-empty">—</span>';
    html += `<tr>
      <td class="editor-name"><span class="health ${s.health}"></span>${s.editor}</td>
      <td class="num">${s.pending_videos}</td>
      <td class="num">${s.pending_clientes}</td>
      <td class="num">${s.delivered_week || '<span class="badge-empty">0</span>'}</td>
      <td class="num">${s.delivered_month || '<span class="badge-empty">0</span>'}</td>
      <td class="num">${turn}</td>
      <td class="num">${oldest}</td>
    </tr>`;
  }
  html += `</tbody></table>`;

  content.innerHTML = html;
}

// Auto-refresh cada 60s
setInterval(loadStats, 60000);
</script>
</body>
</html>
