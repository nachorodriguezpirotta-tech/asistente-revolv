<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>📝 Revisiones — Asistente Revolv</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f1115">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background:#0f1115; color:#e8eaed;
         padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  .app-header { position:sticky; top:0; z-index:50; background:#0f1115; padding:12px 16px;
    padding-top:calc(12px + env(safe-area-inset-top));
    border-bottom:1px solid #2a2f3a; display:flex; align-items:center; gap:12px; }
  .back-btn { display:inline-flex; align-items:center; justify-content:center; min-width:40px; min-height:40px;
    background:rgba(255,255,255,0.06); border-radius:10px; color:#e8eaed; text-decoration:none;
    font-size:18px; font-weight:600; }
  .header-title { flex:1; min-width:0; }
  .header-title h1 { margin:0; font-size:17px; font-weight:600; }
  .header-title .subtitle { font-size:11px; color:#8a93a3; }
  .page { padding:16px; max-width:1000px; margin:0 auto; }

  .stats-row { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; margin-bottom:18px; }
  .stat { background:#1a1e27; border:1px solid #2a2f3a; border-radius:10px; padding:12px; text-align:center; cursor:pointer; transition:background 0.12s; }
  .stat:hover { background:#222732; }
  .stat.active { background:#2a3445; border-color:#60a5fa; }
  .stat .n { font-size:22px; font-weight:700; }
  .stat .lbl { font-size:11px; color:#8a93a3; text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }
  .stat.pending .n { color:#fbbf24; }
  .stat.revision .n { color:#f87171; }
  .stat.approved .n { color:#4ade80; }
  .stat.resolved .n { color:#60a5fa; }

  .filter-tabs { display:flex; gap:4px; margin-bottom:14px; overflow-x:auto; }
  .filter-tabs button { background:#1a1e27; border:1px solid #2a2f3a; color:#8a93a3;
    padding:6px 12px; border-radius:6px; cursor:pointer; font-size:12px; font-family:inherit; white-space:nowrap; }
  .filter-tabs button.active { background:#2a3445; color:#fff; border-color:#60a5fa; }

  .review-list { display:flex; flex-direction:column; gap:8px; }
  .review {
    background:#1a1e27; border:1px solid #2a2f3a; border-radius:10px; padding:14px 16px;
  }
  .review.urgent { border-left:3px solid #f87171; }
  .review .row1 { display:flex; align-items:center; gap:10px; margin-bottom:6px; flex-wrap:wrap; }
  .review .cliente { font-weight:600; font-size:14px; }
  .review .video { font-size:12px; color:#8a93a3; font-family:monospace; }
  .review .meta { display:flex; gap:14px; font-size:11px; color:#8a93a3; margin-top:4px; flex-wrap:wrap; }
  .review .notes {
    background:rgba(251,191,36,0.08); border-left:2px solid #fbbf24;
    padding:8px 12px; border-radius:4px; margin-top:8px;
    font-size:13px; line-height:1.5; white-space:pre-wrap; word-break:break-word;
    color:#e8eaed;
  }
  .badge { padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600; text-transform:uppercase; }
  .badge.pending { background:rgba(251,191,36,0.18); color:#fbbf24; }
  .badge.revision { background:rgba(248,113,113,0.18); color:#f87171; }
  .badge.approved { background:rgba(74,222,128,0.18); color:#4ade80; }
  .badge.resolved { background:rgba(96,165,250,0.18); color:#60a5fa; }

  .del-btn {
    background:transparent; border:none; color:#5a6478;
    font-size:16px; padding:6px 10px; border-radius:6px; cursor:pointer;
    opacity:0.5; transition:opacity 0.15s, background 0.15s;
    margin-left:auto;
  }
  .review:hover .del-btn { opacity:1; }
  .del-btn:hover { background:rgba(248,113,113,0.15); color:#f87171; }
  .resolve-btn {
    margin-left:auto; padding:5px 10px; background:rgba(74,222,128,0.12);
    color:#4ade80; border:1px solid rgba(74,222,128,0.35); border-radius:6px;
    font-size:11px; font-weight:600; cursor:pointer; transition:all 0.15s;
  }
  .resolve-btn:hover { background:rgba(74,222,128,0.25); }
  .empty { color:#5a6478; text-align:center; padding:40px 16px; }
  .loading { color:#5a6478; text-align:center; padding:40px 16px; }
  .error { color:#f87171; text-align:center; padding:24px; }
  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .review { padding:12px 14px; }
  }
</style>
</head>
<body>
<header class="app-header">
  <a href="javascript:goBack()" class="back-btn">←</a>
  <div class="header-title">
    <h1>📝 Revisiones</h1>
    <div class="subtitle">Cliente feedback de videos entregados</div>
  </div>
</header>
<div class="page">
  <div id="stats" class="stats-row"></div>
  <div class="filter-tabs" id="filters"></div>
  <div id="list"><div class="loading">Cargando...</div></div>
</div>

<script>
const params = new URLSearchParams(location.search);
let TOKEN = params.get('t') || '';
let EDITOR = params.get('editor') || '';
let IS_ADMIN = params.get('admin') === '1';

if (TOKEN) {
  try {
    const saved = JSON.parse(localStorage.getItem('revolv_auth') || '{}');
    localStorage.setItem('revolv_auth', JSON.stringify({ ...saved, token: TOKEN, admin: IS_ADMIN, editor: EDITOR }));
  } catch(e){}
} else {
  try {
    const saved = JSON.parse(localStorage.getItem('revolv_auth') || 'null');
    if (saved && saved.token) {
      TOKEN = saved.token; IS_ADMIN = !!saved.admin; EDITOR = saved.editor || '';
    }
  } catch(e){}
}

let DATA = null;
let CURRENT_FILTER = 'all';

function goBack() {
  const base = IS_ADMIN ? `/?admin=1&t=${encodeURIComponent(TOKEN)}` : `/?editor=${encodeURIComponent(EDITOR)}&t=${encodeURIComponent(TOKEN)}`;
  location.href = base;
}

async function load() {
  try {
    const qs = IS_ADMIN ? `admin=1&t=${encodeURIComponent(TOKEN)}` : `editor=${encodeURIComponent(EDITOR)}&t=${encodeURIComponent(TOKEN)}`;
    const res = await fetch(`/api/reviews?${qs}`);
    const d = await res.json();
    if (!res.ok || !d.ok) throw new Error(d.error || 'HTTP ' + res.status);
    DATA = d;
    render();
  } catch (e) {
    document.getElementById('list').innerHTML = `<div class="error">Error: ${escape(e.message)}</div>`;
  }
}

function render() {
  // Stats: solo 2 cards porque ya no guardamos 'pending' ni 'approved' en DB.
  // 'revision_requested' = activas. 'resolved' = histórico (cambio entregado).
  const s = DATA.stats || { revision_requested:DATA.open_count||0, resolved:0, total:(DATA.items||[]).length };
  document.getElementById('stats').innerHTML = `
    <div class="stat revision ${CURRENT_FILTER==='revision_requested'?'active':''}" onclick="setFilter('revision_requested')">
      <div class="n">${s.revision_requested||0}</div><div class="lbl">Pidió cambios</div>
    </div>
    <div class="stat resolved ${CURRENT_FILTER==='resolved'?'active':''}" onclick="setFilter('resolved')">
      <div class="n">${s.resolved||0}</div><div class="lbl">Resueltas</div>
    </div>
  `;
  const openCount = s.revision_requested || 0;
  document.getElementById('filters').innerHTML = `
    <button class="${CURRENT_FILTER==='revision_requested'?'active':''}" onclick="setFilter('revision_requested')">⚡ Pendientes</button>
    <button class="${CURRENT_FILTER==='resolved'?'active':''}" onclick="setFilter('resolved')">✅ Resueltas</button>
    <button class="${CURRENT_FILTER==='all'?'active':''}" onclick="setFilter('all')">Todas</button>
    ${openCount > 0 ? `<button onclick="resolveAll(${openCount})"
       style="margin-left:auto; background:rgba(74,222,128,0.14); color:#4ade80; border:1px solid rgba(74,222,128,0.35); border-radius:8px; padding:6px 14px; cursor:pointer; font-weight:600;">
       ✅ Marcar todas como corregidas (${openCount})</button>` : ''}
  `;

  let items = DATA.items || [];
  if (CURRENT_FILTER !== 'all') {
    items = items.filter(i => i.status === CURRENT_FILTER);
  }

  if (items.length === 0) {
    document.getElementById('list').innerHTML = `<div class="empty">No hay revisiones que mostrar.</div>`;
    return;
  }

  document.getElementById('list').innerHTML = `
    <div class="review-list">${items.map(renderItem).join('')}</div>
  `;
}

function renderItem(r) {
  const statusBadge = {
    'pending': '<span class="badge pending">Sin responder</span>',
    'revision_requested': '<span class="badge revision">Pidió cambios</span>',
    'approved': '<span class="badge approved">Aprobada</span>',
    'resolved': '<span class="badge resolved">Resuelta</span>',
  }[r.status] || '';
  const created = fmtDate(r.created_at);
  const responded = r.responded_at ? `Respondió: ${fmtDate(r.responded_at)}` : '';
  const resolved = r.resolved_at ? `Resuelta: ${fmtDate(r.resolved_at)}` : '';
  const isUrgent = r.status === 'revision_requested';

  const delBtn = IS_ADMIN
    ? `<button class="del-btn" onclick="deleteReview(${r.id}, '${escape(r.cliente).replace(/'/g, "&#39;")}')" title="Borrar esta revisión">🗑</button>`
    : '';

  // Botón "✅ Marcar corregido" — visible si la review está activa.
  const canResolve = r.status === 'revision_requested';
  const resolveBtn = canResolve
    ? `<button class="resolve-btn" onclick="resolveReview(${r.id}, '${escape(r.cliente).replace(/'/g, "&#39;")}')" title="Marcar como ya corregido">✅ Marcar corregido</button>`
    : '';

  return `
    <div class="review ${isUrgent?'urgent':''}" data-id="${r.id}">
      <div class="row1">
        ${statusBadge}
        <span class="cliente">${escape(r.cliente)}</span>
        <span class="video">📹 ${escape(r.video_file_name || '?')}</span>
        ${r.editor ? `<span style="font-size:11px;color:#8a93a3;">· editor ${escape(r.editor)}</span>` : ''}
        ${resolveBtn}
        ${delBtn}
      </div>
      <div class="meta">
        <span>📅 Enviada: ${created}</span>
        ${responded ? `<span>💬 ${responded}</span>` : ''}
        ${resolved ? `<span>✅ ${resolved}</span>` : ''}
      </div>
      ${r.notes ? `<div class="notes">${linkify(r.notes, r)}</div>` : ''}
      ${renderAttachments(r)}
    </div>
  `;
}

function renderAttachments(r) {
  const atts = r.attachments || [];
  if (atts.length === 0) return '';
  const thumbs = atts.map(a => {
    const url = `/api/review_attachment?id=${a.id}&admin=1&t=${encodeURIComponent(TOKEN)}`;
    return `<a href="${url}" target="_blank" style="display:block;">
      <img src="${url}" alt="${escape(a.filename||'')}" style="width:72px;height:72px;object-fit:cover;border-radius:6px;border:1px solid #2a2f3a;">
    </a>`;
  }).join('');
  return `<div style="margin-top:10px; padding-top:10px; border-top:1px solid #2a2f3a;">
    <div style="font-size:11px; color:#8a93a3; margin-bottom:6px;">📷 ${atts.length} foto${atts.length!==1?'s':''} adjunta${atts.length!==1?'s':''}</div>
    <div style="display:flex; gap:6px; flex-wrap:wrap;">${thumbs}</div>
  </div>`;
}

async function deleteReview(id, cliente) {
  if (!confirm(`¿Borrar esta revisión de "${cliente}"?\n\nNo se puede deshacer.`)) return;
  try {
    const res = await fetch(`/api/review?id=${id}&admin=1&t=${encodeURIComponent(TOKEN)}`, {
      method: 'DELETE',
    });
    const d = await res.json();
    if (!res.ok || !d.ok) throw new Error(d.error || 'HTTP ' + res.status);
    // Reload data para refresh stats
    await load();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function resolveReview(id, cliente) {
  if (!confirm(`¿Marcar como corregido el feedback de "${cliente}"?\n\nLa revisión pasa al histórico.`)) return;
  try {
    const authQs = IS_ADMIN
      ? `admin=1&t=${encodeURIComponent(TOKEN)}`
      : `editor=${encodeURIComponent(EDITOR)}&t=${encodeURIComponent(TOKEN)}`;
    const res = await fetch(`/api/review?action=resolve&id=${id}&${authQs}`);
    const d = await res.json();
    if (!res.ok || !d.ok) throw new Error(d.error || 'HTTP ' + res.status);
    await load();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function resolveAll(n) {
  // Marca TODAS las correcciones abiertas como corregidas. Admin: todas; editor:
  // solo las suyas (el backend filtra). NO manda mails a clientes (limpieza).
  if (!confirm(`¿Marcar las ${n} correcciones pendientes como corregidas?\n\n(No se avisa a los clientes — es solo limpieza del tablero.)`)) return;
  try {
    const auth = IS_ADMIN ? `admin=1&t=${encodeURIComponent(TOKEN)}` : `editor=${encodeURIComponent(EDITOR)}&t=${encodeURIComponent(TOKEN)}`;
    const res = await fetch(`/api/review?action=resolve_all&${auth}`);
    const d = await res.json();
    if (!res.ok || d.error) throw new Error(d.error || res.status);
    await load();
    alert(`✅ ${d.resolved} correcciones marcadas como corregidas.`);
  } catch (e) {
    alert('No se pudo: ' + e.message);
  }
}

function setFilter(f) {
  CURRENT_FILTER = f;
  render();
}

function fmtDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleString('es-AR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
  } catch(e) { return iso; }
}

function escape(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// Escapa HTML y convierte URLs http(s):// en <a> clickeables.
// Si reviewCtx tiene id+editor, los links al portal con view=editor se
// enriquecen con &rid=ID&editor=X&edt=TOKEN para que el botón "Marcar
// corregido" del portal pueda autenticarse contra el asistente.
function linkify(s, reviewCtx) {
  const escaped = escape(s);
  return escaped.replace(/(https?:\/\/[^\s<]+)/g, (url) => {
    let finalUrl = url;
    try {
      const isPortalEditor = url.includes('revolv-portal.vercel.app/p/') && url.includes('view=editor');
      if (isPortalEditor && reviewCtx && reviewCtx.id) {
        const editorFor = IS_ADMIN ? (reviewCtx.editor || '') : EDITOR;
        // Para admin, el token tiene que ser el del editor de la review
        // (no el de admin) porque el endpoint /api/review?action=resolve
        // valida editor+token o admin+token; pasamos admin=1 + admin token
        // en ese caso.
        const sep = url.includes('?') ? '&' : '?';
        if (IS_ADMIN) {
          finalUrl = `${url}${sep}rid=${reviewCtx.id}&adm=1&edt=${encodeURIComponent(TOKEN)}`;
        } else if (editorFor) {
          finalUrl = `${url}${sep}rid=${reviewCtx.id}&editor=${encodeURIComponent(editorFor)}&edt=${encodeURIComponent(TOKEN)}`;
        }
      }
    } catch (_) {}
    return `<a href="${finalUrl}" target="_blank" rel="noopener" style="color:#7dd3fc;text-decoration:underline;">${url}</a>`;
  });
}

if (!TOKEN) {
  document.getElementById('list').innerHTML = '<div class="error">Falta token. Abrí desde el dashboard.</div>';
} else if (!IS_ADMIN && !EDITOR) {
  document.getElementById('list').innerHTML = '<div class="error">Falta editor o admin en URL.</div>';
} else {
  // Default: solo mostrar las pendientes (revision_requested)
  CURRENT_FILTER = 'revision_requested';
  load();
}
</script>
</body>
</html>
